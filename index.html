<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Baby Angel ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9ecf,#ffd6e7,#fff0f5,#ffe6f0);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:420px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(15px);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);
animation:pop .8s;
z-index:2;
}

@keyframes pop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

img{
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
box-shadow:0 10px 25px rgba(0,0,0,.15);
margin-bottom:20px;
}

h1{
color:#ff4d88;
margin-bottom:15px;
}

h2{
margin-top:20px;
margin-bottom:25px;
color:#ff4d88;
}

p{
color:#555;
line-height:1.8;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff4d88;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff2f72;
}

#noBtn{
background:#ddd;
color:#333;
margin-left:10px;
}

.heart{
position:fixed;
bottom:-30px;
pointer-events:none;
animation:float 7s linear forwards;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="LOVE.mp3" type="audio/mpeg">
</audio>

<div class="card">

<img src="US.jpg" alt="Us">

<h1>Hi, Angel ❤️</h1>

<p>

Before you continue...

I made something special just for you.

There's something I've been wanting to tell you.

</p>

<button onclick="startLove()">

Open My Heart ❤️

</button>

</div>

<script>

const card=document.querySelector(".card");

const music=document.getElementById("bgMusic");

function hearts(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

}

setInterval(hearts,500);

function startLove(){

music.play();

card.innerHTML=`

<h1>To My Angel ❤️</h1>

<p id="typing" style="white-space:pre-line;"></p>

<button id="nextBtn" onclick="proposal()" style="display:none;">
One More Thing... 🥹
</button>

`;

const text=`Hi Angel,

Bago ang lahat, gusto ko lang sabihin na sobrang thankful ako na nakilala kita.

Hindi ko in-expect na magiging ganito ka ka-special sa'kin.

Sa bawat tawanan natin, sa bawat kwentuhan, at kahit simpleng usap lang natin, napapasaya mo na agad ako.

Thank you for always being yourself.

Thank you for making me smile.

At habang tumatagal, mas lalo kong nare-realize na ikaw yung taong gusto kong piliin araw-araw.

Kaya may gusto sana akong itanong sa'yo... ❤️`;

const typing=document.getElementById("typing");

let i=0;

function type(){

if(i<text.length){

typing.innerHTML+=text.charAt(i);

i++;

setTimeout(type,35);

}else{

document.getElementById("nextBtn").style.display="inline-block";

}

}

type();

}

function proposal(){

card.innerHTML=`

<h1>Angel... ❤️</h1>

<h2>Will You Be My Girlfriend?</h2>

<div>

<button onclick="yesAnswer()">YES ❤️</button>

<button id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">
NO 🙈
</button>

</div>

`;

}

function moveNo(){

const btn=document.getElementById("noBtn");

btn.style.position="fixed";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-70)+"px";

}

function yesAnswer(){

card.innerHTML=`

<h1>YAYYYYY!! ❤️</h1>

<p style="white-space:pre-line;">

Thank you for saying YES, Angel.

I promise to always choose you,
respect you,
support you,
and love you with all my heart.

Hindi man ako perfect,
pero araw-araw kong pipiliin na mahalin ka.

I love you so much. ❤️

Love,
JV

</p>

`;

for(let i=0;i<120;i++){

setTimeout(hearts,i*80);

}

}

</script>

</body>
</html>
