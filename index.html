<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Baby Angel ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9ecf,#ffd6e7,#fff0f5,#ffe6f0);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.sparkle{position:fixed;width:4px;height:4px;background:white;border-radius:50%;opacity:.8;animation:spark 3s linear forwards;pointer-events:none}
@keyframes spark{from{transform:translateY(0) scale(1);opacity:1}to{transform:translateY(-120px) scale(0);opacity:0}}
.card{
animation:pop .8s, glow 2.5s ease-in-out infinite alternate;
width:90%;
max-width:420px;
background:rgba(255,255,255,.9);
backdrop-filter:blur(15px);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);
animation:pop .8s;
z-index:2;
}

@keyframes glow{from{box-shadow:0 15px 40px rgba(255,77,136,.25)}to{box-shadow:0 20px 60px rgba(255,77,136,.55)}}
@keyframes pop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

img{
animation:photoFloat 6s ease-in-out infinite, photoZoom 12s ease-in-out infinite;
position:relative;
width:180px;
height:180px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
box-shadow:0 10px 25px rgba(0,0,0,.15);
margin-bottom:20px;
}

h1{
color:#ff4d88;
margin-bottom:15px;
}

h2{
margin-top:20px;
margin-bottom:25px;
color:#ff4d88;
}

p{
color:#555;
line-height:1.8;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
background:#ff4d88;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
background:#ff2f72;
}

#noBtn{
background:#ddd;
color:#333;
margin-left:10px;
}

.heart{
position:fixed;
bottom:-30px;
pointer-events:none;
animation:float 7s linear forwards;
}

@keyframes float{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}


#stars{position:fixed;inset:0;pointer-events:none;background:
radial-gradient(2px 2px at 20% 30%,#fff,transparent 60%),
radial-gradient(2px 2px at 80% 20%,#fff,transparent 60%),
radial-gradient(1.5px 1.5px at 60% 70%,#fff,transparent 60%);
animation:twinkle 3s infinite alternate;opacity:.8}
@keyframes twinkle{from{opacity:.4}to{opacity:1}}
.rose{position:fixed;top:-30px;font-size:24px;animation:fall 8s linear forwards;pointer-events:none}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:.2}}
.ring{font-size:90px;filter:drop-shadow(0 0 18px gold);animation:ring 2s ease-in-out infinite alternate}
@keyframes ring{from{transform:scale(.9)}to{transform:scale(1.08)}}


img::after{content:'';}
@keyframes photoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes photoZoom{0%,100%{scale:1}50%{scale:1.06}}
img{box-shadow:0 0 25px rgba(255,105,180,.5),0 10px 25px rgba(0,0,0,.15);}
.card{transition:all .8s ease}
.fadeOut{animation:fadeOut .8s forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(.95);filter:blur(8px)}}
.proposalTitle{animation:pop 1s ease,glow 2s infinite alternate}
.yesGlow{animation:yesPulse 1.5s infinite}
@keyframes yesPulse{50%{transform:scale(1.08);box-shadow:0 0 25px #ff4d88}}

</style>

</head>

<body><div id='stars'></div>

<audio id="bgMusic" loop>
<source src="LOVE.mp3" type="audio/mpeg">
</audio>

<div class="card">

<img src="US.jpg" alt="Us">

<h1>Hi, Angel ❤️</h1>

<p>

Before you continue...

I made something special just for you.

There's something I've been wanting to tell you.

</p>

<button onclick="startLove()">

Open My Heart ❤️

</button>

</div>

<script>

const card=document.querySelector(".card");

const music=document.getElementById("bgMusic");

function hearts(){

const h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},7000);

}

setInterval(hearts,350);
function sparkle(){const s=document.createElement('div');s.className='sparkle';s.style.left=Math.random()*100+'vw';s.style.top=(60+Math.random()*40)+'vh';document.body.appendChild(s);setTimeout(()=>s.remove(),3000);}setInterval(sparkle,2500);

function startLove(){

music.play();

card.innerHTML=`

<h1>To My Angel ❤️</h1>

<p id="typing" style="white-space:pre-line;"></p>

<button id="nextBtn" onclick="proposal()" style="display:none;">
One More Thing... 🥹
</button>

`;

const text=`HAIIIIIIIIIIIIIIIIIIIIIII MY BABYYYYYYYY

If you are reading this, it means you finally opened the surprise I made just for you.

Alam mo/kong sobrang layo na'tin sa isa't isa, and we can't go on datess wheneverrr we want, we can't randomly hugg eachhh other after a long day, and we can'tt be togetherrr whenever we missss eachh other.

Evennn so, u are stillll the personnn I want to talk to every dayyyyy.

Thankk youu for alwayss tryinggg to make time for me, for staying even on the days na may tampuhan tayooo. Thankkk youuuuu po sa palagingggg pag-intindiii sa'kinn kahit na minsan ang kulit-kulit ko po, babiii ko, or ang gulo-gulo ko kausappppp, at minsan pa nga nag-ooverthink pa. :<

Every callssssss, every good morning, every good night, every "ingat ka" means so much to me sauuuuuuuuur, and minsan may mga picture pa MWHEHEHEHHE.

I LOVE YOU SOOOOOOOO MUHHH!

YOU BECAME MY COMFORT, MY SAFE PLACE, AND MY EVERYTHING!

I know I'm not perfect. I make mistakes, I get jealous sometimes, I overthink, and minsan hindi ko alam kung ano yung sasabihin sa'yo, babiiiiii kooooo. Pero kahit na gano'n, ikawwww pa rinn yung minamahalllll ko ng sobraaaaa, akinggggggg MAHALLLLLLL na asawa.

Kahit na gaano pa tayo kalayo sa isa't isa, ikawww at ikaw pa din, wala nang iba. Ikaw ang gusto kong makasama habang buhay, ang gusto kong mahalin habangg buhayyy, at ang gusto kong suportahan habang buhayy!!!

I don't know what tomorrow will bring us, but I do know one thing, and yun ang makasama ka and ma-experience nating dalawa nang magkasama.

But before anything else, babiiii...

There's something na gustong-gusto ko na ding itanong sa'yo...

ASAWAAAAAAAAA ko..........`;

const typing=document.getElementById("typing");

let i=0;

function type(){

if(i<text.length){

typing.innerHTML+=text.charAt(i);

i++;

setTimeout(type,35);

}else{

document.getElementById("nextBtn").style.display="inline-block";

}

}

type();

}

function proposal(){

card.innerHTML=`

<h1>Angel... ❤️</h1>

<h2>Will You Be My Girlfriend?</h2>

<div>

<button onclick="yesAnswer()">YES ❤️</button>

<button id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">
NO 🙈
</button>

</div>

`;

}

function moveNo(){

const btn=document.getElementById("noBtn");

btn.style.position="fixed";

btn.style.left=Math.random()*(window.innerWidth-120)+"px";

btn.style.top=Math.random()*(window.innerHeight-70)+"px";

}

function yesAnswer(){

card.innerHTML=`

<h1>YAYYYYY!! ❤️</h1>

<p style="white-space:pre-line;">

YAYYYAYAYAYAYAYY!! ❤️

SAUUUUUUUURRRRRRR happy that you said yes to me.

MY ONE AND ONLY, I WANT TO BE WITH YOU MY WHOLE LIFE.

ANDDDDD ITO NA YUNG SIMULAAAAA, ASAWAAAAAAAAA KOOOOOOOOOOO. ❤️

I WILL ALWAYS BE THEREEEE FOR YOUUUUU, ASAWAAAAAAAAA KOOOOOO, NO MATTER WHATTTTT!

I WILL NEVERRRRR STOP LOVINGGGG YOUUUUUU.

I WILL ALWAYSSSS CHOOSE YOUUUUU, SUPPORT YOUUUUU, AND ALWAYS REMIND YOUUUUUUU NA SAUUUUUUUUUUURRRRRR MAHALLLLL NA MAHALLLLLLL NA MAHALLLLLLLLLL KITAAAAAAA HABANG BUHAYYYYY. ❤️

I LOVE YOU NOWWWW, I WILL LOVE YOU EVEN MORE TOMORROW, AND I WILL LOVE YOU THE MOST EVERY SINGLE DAY AND FOREVERRRRR.

THANK YOU FOR CHOOSING MEEEE, BABIIIIII. I PROMISE TO TAKE CARE OF YOUR HEARTTTT, MAKE YOU FEEL LOVED EVERY DAYYYY, AND STAY BY YOUR SIDEEEE NO MATTER WHAT LIFE THROWS AT US.

FOREVER USSSSSSSSS! ❤️

LOVE,
JV

</p>

`;

for(let i=0;i<220;i++){

setTimeout(hearts,i*80);

}

}


function roses(){const r=document.createElement('div');r.className='rose';r.innerHTML='🌹';r.style.left=Math.random()*100+'vw';document.body.appendChild(r);setTimeout(()=>r.remove(),8000);}
setInterval(roses,900);
const oldProposal=proposal;
proposal=function(){
card.innerHTML=`<div style="text-align:center">
<div class="ring">💍</div>
<h2 style="color:#ff4d88">From the very first day...</h2>
<p>My heart has always chosen you ❤️<br><br>And today... I want to ask you something.</p>
</div>`;
setTimeout(()=>{
card.classList.add('fadeOut');
setTimeout(()=>{card.classList.remove('fadeOut');oldProposal();
setTimeout(()=>{
document.querySelector('h2').classList.add('proposalTitle');
document.querySelector('button').classList.add('yesGlow');
},200);
},800);
},5000);
}
const oldYes=yesAnswer;
yesAnswer=function(){
for(let i=0;i<120;i++){
setTimeout(()=>{let e=document.createElement('div');e.className='sparkle';e.style.left=Math.random()*100+'vw';e.style.top=Math.random()*100+'vh';document.body.appendChild(e);setTimeout(()=>e.remove(),3000);},i*40);
}
oldYes();
}

</script>

</body>
</html>
